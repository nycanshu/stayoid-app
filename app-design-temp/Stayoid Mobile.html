<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Stayoid · Mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: #1C1B19;
    color: #F1EFE9;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  *, *::before, *::after { box-sizing: border-box; }
  ::-webkit-scrollbar { display: none; }
  .canvas {
    min-height: 100vh;
    padding: 48px 24px 80px;
    display: flex; flex-direction: column; align-items: center; gap: 28px;
  }
  .title-row {
    width: 100%; max-width: 1400px;
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 0 16px;
  }
  .title-main {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 40px; letter-spacing: -0.5; line-height: 1;
  }
  .title-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase;
    color: rgba(241,239,233,0.5); margin-top: 8px;
  }
  .tab-bar {
    display: flex; gap: 4px; padding: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 100px; max-width: 100%; overflow-x: auto;
  }
  .tab {
    padding: 8px 14px; border-radius: 100px;
    font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 600;
    color: rgba(241,239,233,0.65); cursor: pointer; white-space: nowrap;
    transition: background 180ms, color 180ms;
  }
  .tab.active { background: #F1EFE9; color: #1C1B19; }
  .frames {
    display: flex; gap: 40px; flex-wrap: wrap;
    justify-content: center; align-items: flex-start;
  }
  .frame-col { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .frame-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 1.6px; text-transform: uppercase;
    color: rgba(241,239,233,0.4);
  }
  .tweaks {
    position: fixed; top: 20px; right: 20px; z-index: 9999;
    background: rgba(28,27,25,0.92); backdrop-filter: blur(14px);
    border: 1px solid rgba(241,239,233,0.12);
    border-radius: 18px; padding: 16px; width: 240px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    font-family: 'Inter', sans-serif;
  }
  .tweaks h3 {
    margin: 0 0 12px; font-family: 'Instrument Serif', serif;
    font-size: 18px; font-weight: 400; letter-spacing: -0.2px;
  }
  .tweak-row { margin-bottom: 12px; }
  .tweak-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; letter-spacing: 1.4px; text-transform: uppercase;
    color: rgba(241,239,233,0.5); margin-bottom: 6px;
  }
  .tweak-opts { display: flex; gap: 4px; background: rgba(255,255,255,0.06); padding: 3px; border-radius: 100px; }
  .tweak-opt {
    flex: 1; padding: 6px 10px; border-radius: 100px; text-align: center;
    font-size: 11px; font-weight: 600; cursor: pointer;
    color: rgba(241,239,233,0.6);
  }
  .tweak-opt.active { background: #F1EFE9; color: #1C1B19; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="frames/android-frame.jsx"></script>
<script type="text/babel" src="components/tokens.jsx"></script>
<script type="text/babel" src="components/data.jsx"></script>
<script type="text/babel" src="components/chrome.jsx"></script>
<script type="text/babel" src="components/screens-core.jsx"></script>
<script type="text/babel" src="components/screens-more.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "card": "soft",
  "state": "populated"
}/*EDITMODE-END*/;

const SCREENS = [
  { id: 'dashboard', label: 'Dashboard' },
  { id: 'properties', label: 'Properties' },
  { id: 'propdetail', label: 'Property' },
  { id: 'tenants', label: 'Tenants' },
  { id: 'tenant', label: 'Tenant' },
  { id: 'payments', label: 'Payments' },
  { id: 'addprop', label: 'Add property' },
  { id: 'recordpay', label: 'Record payment' },
  { id: 'notifs', label: 'Notifications' },
  { id: 'profile', label: 'Profile' },
];

function App() {
  const [screen, setScreen] = React.useState(() => localStorage.getItem('stay_screen') || 'dashboard');
  const [mode, setMode] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('stay_mode')) || TWEAKS; } catch { return TWEAKS; }
  });
  const [editMode, setEditMode] = React.useState(false);
  const [selProp, setSelProp] = React.useState(null);
  const [selTenant, setSelTenant] = React.useState(null);
  const [showRecord, setShowRecord] = React.useState(false);

  // Persist
  React.useEffect(() => { localStorage.setItem('stay_screen', screen); }, [screen]);
  React.useEffect(() => { localStorage.setItem('stay_mode', JSON.stringify(mode)); }, [mode]);

  // Tweak protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode') setEditMode(true);
      if (d.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweak = (k, v) => {
    const next = { ...mode, [k]: v };
    setMode(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const t = stayTokens(mode);
  const empty = mode.state === 'empty';

  const openProp = (p) => { setSelProp(p); setScreen('propdetail'); };
  const openTenant = (x) => { setSelTenant(x); setScreen('tenant'); };

  const renderScreen = (navActive, setNavActive) => {
    const common = { t, empty };
    switch (screen) {
      case 'dashboard':
        return <StayDashboard {...common}
          onOpenProp={openProp}
          onNav={(id) => { if (id === 'props') setScreen('properties'); else setScreen(id); }}
          onAddProp={() => setScreen('addprop')}/>;
      case 'properties':
        return <StayProperties {...common} onOpenProp={openProp} onAddProp={() => setScreen('addprop')}/>;
      case 'propdetail':
        return <StayPropertyDetail {...common} prop={selProp || STAY_PROPERTIES[0]}
          onBack={() => setScreen('properties')}
          onAddPayment={() => setShowRecord(true)}/>;
      case 'tenants':
        return <StayTenants {...common} onOpenTenant={openTenant}/>;
      case 'tenant':
        return <StayTenantDetail {...common} tenant={selTenant || STAY_TENANTS[0]}
          onBack={() => setScreen('tenants')}
          onRecord={() => setShowRecord(true)}/>;
      case 'payments':
        return <StayPayments {...common} onRecord={() => setShowRecord(true)}/>;
      case 'addprop':
        return <StayAddProperty t={t} onBack={() => setScreen('dashboard')} onDone={() => setScreen('dashboard')}/>;
      case 'notifs':
        return <StayNotifications {...common} onBack={() => setScreen('dashboard')}/>;
      case 'profile':
        return <StayProfile t={t} onBack={() => setScreen('dashboard')}/>;
      default: return null;
    }
  };

  // Bottom nav active mapping
  const navFor = (s) => {
    if (s === 'dashboard') return 'home';
    if (s === 'properties' || s === 'propdetail' || s === 'addprop') return 'props';
    if (s === 'tenants' || s === 'tenant') return 'tenants';
    if (s === 'payments') return 'pay';
    return 'home';
  };

  const onNavChange = (id) => {
    if (id === 'home') setScreen('dashboard');
    if (id === 'props') setScreen('properties');
    if (id === 'tenants') setScreen('tenants');
    if (id === 'pay') setScreen('payments');
  };

  const navActive = navFor(screen);
  const showBottomNav = !['addprop'].includes(screen);

  const ScreenWithNav = ({ platform }) => (
    <div style={{ position: 'relative', height: '100%', background: t.bg, color: t.text, overflow: 'hidden' }}>
      <div style={{ height: '100%', overflowY: 'auto', paddingTop: platform === 'ios' ? 54 : 0 }}>
        {renderScreen(navActive)}
      </div>
      {showBottomNav && (
        <StayBottomNav t={t} active={navActive} onChange={onNavChange} platform={platform}/>
      )}
      {showRecord && <StayRecordPayment t={t} onClose={() => setShowRecord(false)} onDone={() => setShowRecord(false)}/>}
    </div>
  );

  return (
    <div className="canvas" style={{ background: mode.theme === 'dark' ? '#08080A' : '#1C1B19' }}>
      <div className="title-row">
        <div>
          <div className="title-sub">Stayoid · Mobile</div>
          <div className="title-main">Property management, <span style={{ fontStyle: 'italic', color: '#8BB8A3' }}>in hand</span></div>
        </div>
      </div>

      <div className="tab-bar">
        {SCREENS.map(s => (
          <div key={s.id} className={'tab ' + (screen === s.id ? 'active' : '')} onClick={() => setScreen(s.id)}>
            {s.label}
          </div>
        ))}
      </div>

      <div className="frames">
        <div className="frame-col">
          <IOSDevice dark={mode.theme === 'dark'} width={390} height={820}>
            <ScreenWithNav platform="ios"/>
          </IOSDevice>
          <div className="frame-label">iOS · iPhone 15</div>
        </div>
        <div className="frame-col">
          <AndroidDevice dark={mode.theme === 'dark'} width={390} height={820}>
            <ScreenWithNav platform="android"/>
          </AndroidDevice>
          <div className="frame-label">Android · Material 3</div>
        </div>
      </div>

      {editMode && (
        <div className="tweaks">
          <h3>Tweaks</h3>
          <div className="tweak-row">
            <div className="tweak-label">Theme</div>
            <div className="tweak-opts">
              {['light', 'dark'].map(v => (
                <div key={v} className={'tweak-opt ' + (mode.theme === v ? 'active' : '')} onClick={() => setTweak('theme', v)}>{v}</div>
              ))}
            </div>
          </div>
          <div className="tweak-row">
            <div className="tweak-label">Data state</div>
            <div className="tweak-opts">
              {['empty', 'populated'].map(v => (
                <div key={v} className={'tweak-opt ' + (mode.state === v ? 'active' : '')} onClick={() => setTweak('state', v)}>{v}</div>
              ))}
            </div>
          </div>
          <div className="tweak-row">
            <div className="tweak-label">Card style</div>
            <div className="tweak-opts">
              {['soft', 'bordered'].map(v => (
                <div key={v} className={'tweak-opt ' + (mode.card === v ? 'active' : '')} onClick={() => setTweak('card', v)}>{v}</div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
